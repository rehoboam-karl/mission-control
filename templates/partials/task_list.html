<!-- Task List Partial -->
<div class="space-y-1">
    {% for task in tasks %}
    <div class="flex items-center gap-2 text-sm p-1">
        {% if task.priority == 4 %}
        <span class="text-red-400">[DEBITO]</span>
        {% elif task.priority == 3 %}
        <span class="text-yellow-400">[CREDITO]</span>
        {% else %}
        <span class="text-gray-500">[{{ task.priority }}]</span>
        {% endif %}
        <span>{{ task.content }}</span>
    </div>
    {% else %}
    <div class="text-center text-gray-500 py-4 text-sm">
        <i class="fas fa-check-circle text-2xl mb-2"></i>
        <p>Nenhuma task hoje</p>
    </div>
    {% endfor %}
</div>
