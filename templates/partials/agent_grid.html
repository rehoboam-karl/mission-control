<!-- Agent Grid Partial -->
{% for agent in agents %}
<div class="flex items-center justify-between bg-bg p-2 rounded border border-border">
    <div class="flex items-center gap-2">
        <span class="status-dot status-{{ agent.status }}"></span>
        <span class="text-sm font-mono">{{ agent.name }}</span>
    </div>
    <span class="text-xs text-gray-500">
        {% if agent.last_seen %}{{ agent.last_seen[11:16] }}{% else %}--{% endif %}
    </span>
</div>
{% else %}
<div class="text-center text-gray-500 py-4 text-sm">Nenhum agent encontrado</div>
{% endfor %}
