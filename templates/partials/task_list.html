<!-- Task List Partial -->
<div class="space-y-1">
    {% for task in tasks %}
    <div class="flex items-center gap-2 text-sm p-1 hover:bg-bg/50 rounded">
        {% if task.priority == 4 %}
        <span class="text-red-400 font-medium">[DEBITO]</span>
        {% elif task.priority == 3 %}
        <span class="text-yellow-400 font-medium">[CREDITO]</span>
        {% elif task.priority == 2 %}
        <span class="text-blue-400 font-medium">[MENTAL]</span>
        {% else %}
        <span class="text-gray-500">[ ]</span>
        {% endif %}
        <span class="truncate">{{ task.content }}</span>
    </div>
    {% else %}
    <div class="text-center text-gray-500 py-4 text-sm">
        <i class="fas fa-check-circle text-2xl mb-2"></i>
        <p>Nenhuma task hoje</p>
    </div>
    {% endfor %}
</div>
