{% extends "base.html" %}

{% block content %}
<div class="card p-6">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">
            <i class="fas fa-stream mr-2 text-green-400"></i>Event Feed
        </h1>
        
        <div class="flex items-center gap-2">
            <span class="text-gray-400">Filter:</span>
            <select class="bg-gray-800 border border-gray-700 rounded px-3 py-1 text-sm"
                    hx-get="/events/partial"
                    hx-trigger="change"
                    name="hours">
                <option value="1" {% if hours == 1 %}selected{% endif %}>Last hour</option>
                <option value="6" {% if hours == 6 %}selected{% endif %}>Last 6 hours</option>
                <option value="24" {% if hours == 24 %}selected{% endif %}>Last 24 hours</option>
                <option value="168" {% if hours == 168 %}selected{% endif %}>Last week</option>
            </select>
        </div>
    </div>
    
    <div hx-get="/events/partial?hours={{ hours }}" 
         hx-trigger="every 10s"
         hx-swap="innerHTML">
        {% include "partials/event_feed.html" %}
    </div>
</div>
{% endblock %}
