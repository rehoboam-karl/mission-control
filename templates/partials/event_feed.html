<!-- Event Feed Partial -->
<!-- hx-get="/api/events" hx-trigger="every 10s" hx-swap="innerHTML" -->
<div class="space-y-2 max-h-96 overflow-y-auto">
{% for event in events %}
<div class="flex items-start gap-3 p-3 bg-brand-black/50 rounded-lg border border-brand-border hover:border-brand-accent/30 transition">
    <div class="mt-0.5">
        {% if event.icon == '✅' %}
        <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
        {% else %}
        <i data-lucide="x-circle" class="w-4 h-4 text-red-400"></i>
        {% endif %}
    </div>
    <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-gray-200">{{ event.name[:40] }}</span>
            <span class="text-xs text-gray-500 font-mono">{{ event.ago }}</span>
        </div>
        <div class="text-xs text-gray-400 mt-1 truncate">
            {{ event.summary[:100] }}
        </div>
        <div class="text-xs text-gray-600 mt-1 flex items-center gap-2">
            <span class="px-1.5 py-0.5 bg-brand-card rounded">{{ event.agent }}</span>
            <span>{{ event.model }}</span>
            <span class="text-brand-accent">{{ event.tokens }} tokens</span>
        </div>
    </div>
</div>
{% endfor %}
</div>
