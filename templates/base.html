<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control — Rehoboam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: '#0f172a',
                        surface: '#1e293b',
                        border: '#334155',
                        accent: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-active, .status-running { background-color: #22c55e; }
        .status-idle, .status-pending { background-color: #eab308; }
        .status-error, .status-failed { background-color: #ef4444; }
        .status-unknown { background-color: #6b7280; }
    </style>
</head>
<body class="bg-bg text-gray-200 min-h-screen">
    <!-- Nav -->
    <nav class="bg-surface border-b border-border px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🔮</span>
            <span class="text-lg font-semibold">Mission Control</span>
            <span class="text-xs text-gray-500">— Rehoboam</span>
        </div>
        <div class="flex gap-4 text-sm">
            <a href="/" class="hover:text-accent">Dashboard</a>
            <a href="/agents" class="hover:text-accent">Agents</a>
            <a href="/events" class="hover:text-accent">Events</a>
            <a href="/crons" class="hover:text-accent">Crons</a>
            <a href="/tasks" class="hover:text-accent">Tasks</a>
            <a href="/standup" class="hover:text-accent">Standup</a>
            <a href="/shared" class="hover:text-accent">Context</a>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center text-xs text-gray-500 py-4">
        Rehoboam Mission Control — {{ agent_count }} agents · {{ cron_count }} crons
    </footer>
</body>
</html>
