{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="glass rounded-xl p-6 border border-brand-border">
        <h1 class="text-2xl font-bold flex items-center gap-3">
            <i data-lucide="activity" class="w-7 h-7 text-brand-accent"></i>
            Event Feed
        </h1>
        <div class="flex gap-4 mt-4">
            <div class="flex items-center gap-2">
                <span class="text-gray-400">Filter:</span>
                <select id="hours-filter" 
                        class="bg-brand-black border border-brand-border rounded px-3 py-1 text-sm"
                        hx-get="/events/partial"
                        hx-trigger="change"
                        hx-target="#events-container"
                        hx-swap="innerHTML"
                        name="hours">
                    <option value="1">Last hour</option>
                    <option value="6">Last 6 hours</option>
                    <option value="24" selected>Last 24 hours</option>
                    <option value="168">Last week</option>
                </select>
            </div>
        </div>
    </div>
    
    <!-- Events List -->
    <div id="events-container" class="glass rounded-xl p-6 border border-brand-border"
         hx-get="/events/partial?hours=24" 
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
        {% include "partials/event_feed.html" %}
    </div>
</div>
{% endblock %}
