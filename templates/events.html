{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div class="glass rounded-xl p-6 border border-brand-border">
        <h1 class="text-2xl font-bold flex items-center gap-3">
            <i data-lucide="activity" class="w-7 h-7 text-brand-accent"></i>
            Event Feed
        </h1>
        
        <!-- Filter -->
        <div class="flex gap-4 mt-4">
            <div class="flex items-center gap-2">
                <span class="text-gray-400">Filter:</span>
                <select id="hours-filter" 
                        class="bg-brand-black border border-brand-border rounded px-3 py-1 text-sm"
                        hx-get="/events/partial"
                        hx-trigger="change"
                        hx-target="#events-container"
                        hx-swap="innerHTML"
                        name="hours">
                    <option value="1" {% if hours == 1 %}selected{% endif %}>Last hour</option>
                    <option value="6" {% if hours == 6 %}selected{% endif %}>Last 6 hours</option>
                    <option value="24" {% if hours == 24 or not hours %}selected{% endif %}>Last 24 hours</option>
                    <option value="168" {% if hours == 168 %}selected{% endif %}>Last week</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <button class="text-xs text-brand-accent hover:underline"
                        hx-get="/events/partial?hours={{ hours|default(24) }}"
                        hx-trigger="click"
                        hx-target="#events-container"
                        hx-swap="innerHTML">
                    <i data-lucide="refresh" class="w-4 h-4"></i> Refresh
                </button>
            </div>
        </div>
    </div>
    
    <!-- Events Container -->
    <div id="events-container" class="glass rounded-xl p-6 border border-brand-border"
         hx-get="/events/partial?hours={{ hours|default(24) }}"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="text-center text-gray-500 py-8">
            <i data-lucide="loader" class="w-6 h-6 mx-auto animate-spin"></i>
            <p class="mt-2">Loading...</p>
        </div>
    </div>
</div>
{% endblock %}
