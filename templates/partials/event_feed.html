<!-- Event Feed Partial -->
<!-- hx-get="/api/events" hx-trigger="every 10s" hx-swap="innerHTML" -->
<div class="space-y-2">
{% for event in events %}
<div class="bg-surface rounded border border-border p-3 flex items-start gap-3">
    <span class="text-lg mt-0.5">{{ event.icon }}</span>
    <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between">
            <span class="text-sm font-medium">{{ event.name }}</span>
            <span class="text-xs text-gray-500">{{ event.ago }}</span>
        </div>
        <div class="text-xs text-gray-400 mt-1 truncate">
            {{ event.summary }}
        </div>
        <div class="text-xs text-gray-500 mt-1">
            {{ event.agent }} · {{ event.model }} · {{ event.tokens }} tokens
        </div>
    </div>
</div>
{% endfor %}
</div>
