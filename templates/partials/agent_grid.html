<!-- Agent Grid Partial -->
<!-- hx-get="/api/agents" hx-trigger="every 30s" hx-swap="innerHTML" -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-7 gap-3">
{% for agent in agents %}
{% set status_color = 'green' if agent.status == 'online' or agent.status == 'active' else ('yellow' if agent.status == 'idle' or agent.status == 'working' else 'red') %}
<div class="bg-brand-black/50 rounded-lg p-3 border border-brand-border/50 hover:border-brand-accent/30 transition">
    <div class="flex items-center justify-between mb-1">
        <span class="text-lg">{{ agent.emoji }}</span>
        <span class="status-dot status-{{ status_color }}"></span>
    </div>
    <div class="text-xs font-medium truncate">{{ agent.name }}</div>
    <div class="text-[10px] text-gray-500">{{ agent.last_active }}</div>
</div>
{% endfor %}
</div>
